<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 41 38">
  <defs>
    <linearGradient id="ringD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ff9fe0"/>
      <stop offset="50%" stop-color="#e619a0"/>
      <stop offset="78%" stop-color="#af0f8d"/>
      <stop offset="100%" stop-color="#5c0a5c"/>
    </linearGradient>
    <linearGradient id="fillD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a1140"/>
      <stop offset="55%" stop-color="#230820"/>
      <stop offset="100%" stop-color="#0f030d"/>
    </linearGradient>
    <linearGradient id="glyphD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffcdea"/>
      <stop offset="100%" stop-color="#ff7ac8"/>
    </linearGradient>
  </defs>

  <!-- left page -->
  <path d="M 20.5 5.5
           C 20.5 3.4 18.6 2 16.6 2
           L 4.6 2
           C 2.7 2 2 3.3 2 5
           L 2 28.5
           C 2 30 2.7 30.9 4.3 31.1
           L 15 32.8
           C 17.4 33.3 20.5 34.6 20.5 34.6 Z"
        fill="url(#fillD)" stroke="url(#ringD)" stroke-width="2" stroke-linejoin="round"/>

  <!-- right page -->
  <path d="M 20.5 5.5
           C 20.5 3.4 22.4 2 24.4 2
           L 36.4 2
           C 38.3 2 39 3.3 39 5
           L 39 28.5
           C 39 30 38.3 30.9 36.7 31.1
           L 26 32.8
           C 23.6 33.3 20.5 34.6 20.5 34.6 Z"
        fill="url(#fillD)" stroke="url(#ringD)" stroke-width="2" stroke-linejoin="round"/>

  <!-- corner tab -->
  <path d="M 39 13 L 41.5 16 L 39 19 Z" fill="url(#ringD)"/>

  <!-- spine -->
  <line x1="20.5" y1="4" x2="20.5" y2="34.4" stroke="url(#ringD)" stroke-width="1.4"/>

  <!-- text lines -->
  <g stroke="url(#glyphD)" stroke-width="1.6" stroke-linecap="round">
    <line x1="7" y1="15.5" x2="14" y2="16.3"/>
    <line x1="7" y1="20" x2="14" y2="20.6"/>
    <line x1="27" y1="16.3" x2="34" y2="15.5"/>
    <line x1="27" y1="20.6" x2="34" y2="20"/>
  </g>
</svg>
