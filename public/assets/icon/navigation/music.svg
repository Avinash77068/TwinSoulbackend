<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 35">
  <defs>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A0A34"/>
      <stop offset="1" stop-color="#1E0316"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCCE6"/>
      <stop offset="0.5" stop-color="#FF5FA8"/>
      <stop offset="1" stop-color="#C21464"/>
    </linearGradient>
  </defs>

  <!-- slanted beam connecting the two note stems -->
  <polygon points="16,19 34,5 39,10 21,24"
           fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- stems -->
  <rect x="16.5" y="17" width="4.2" height="14" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.4"/>
  <rect x="34.3" y="7" width="4.2" height="26" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.4"/>

  <!-- note heads -->
  <ellipse cx="11" cy="28" rx="8.3" ry="6.3" transform="rotate(-18 11 28)"
           fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6"/>
  <ellipse cx="31.5" cy="31" rx="6.3" ry="5.3" transform="rotate(-12 31.5 31)"
           fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6"/>
</svg>
