<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 44">
  <defs>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A0A34"/>
      <stop offset="1" stop-color="#1E0316"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCCE6"/>
      <stop offset="0.5" stop-color="#FF5FA8"/>
      <stop offset="1" stop-color="#C21464"/>
    </linearGradient>
  </defs>

  <!-- back person (right, partially behind) -->
  <path d="M18,39 L18,29 Q18,22 25,22 L33,22 Q40,22 40,29 L40,39 Z"
        fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6" stroke-linejoin="round"/>
  <circle cx="29" cy="16" r="6.3" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6"/>

  <!-- front person (left, in front) -->
  <path d="M2,40 L2,28 Q2,21 10,21 L21,21 Q29,21 29,28 L29,40 Z"
        fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6" stroke-linejoin="round"/>
  <circle cx="14" cy="16.5" r="7.3" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.6"/>
</svg>
