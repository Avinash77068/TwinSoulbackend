  <path d="M11.2 35.2 C11.2 27.2 16.6 22.7 23.5 22.7 C30.4 22.7 35.8 27.2 35.8 35.2" fill="none" stroke="url(#headGrad)" stroke-width="3.1" stroke-linecap="round"/>
</svg>
