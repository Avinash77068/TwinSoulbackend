<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 39 42">
  <defs>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A0A34"/>
      <stop offset="1" stop-color="#1E0316"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFCCE6"/>
      <stop offset="0.5" stop-color="#FF5FA8"/>
      <stop offset="1" stop-color="#C21464"/>
    </linearGradient>
  </defs>

  <!-- 2x2 grid of rounded squares -->
  <rect x="2" y="5" width="14" height="14" rx="5" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.8"/>
  <rect x="19" y="5" width="14" height="14" rx="5" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.8"/>
  <rect x="2" y="23" width="14" height="14" rx="5" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.8"/>
  <rect x="19" y="23" width="14" height="14" rx="5" fill="url(#fillGrad)" stroke="url(#strokeGrad)" stroke-width="1.8"/>
</svg>
